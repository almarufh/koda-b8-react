name: Publish App
run-name: ${{github.event.head_commit.message}}
on:
  push:
    tags:
      - v*
jobs:
  get-source-code:
    name: "Get source code project"
    runs-on: ubuntu-latest
    outputs:
      output: ${{ steps.upload-source.outputs.artifact-id }}
    steps:
      - name: Get source code
        uses: actions/checkout@v7
      - name: Uploads file in artifact
        uses: actions/upload-artifact@v7
        id: upload-source
        with:
          name: upload-source
          path: |
            public/
            src/
            index.html
            package.json
            package-lock.json
            vite.config.js
            nginx.conf
            eslint.config.js
  build-app:
    name: "Build React App into Distributable"
    needs: get-source-code
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.upload-dist.outputs.artifact-id }}
    steps:
      - name: Download source in artifact
        uses: actions/download-artifact@v8
        with:
          name: upload-source
      - name: Setup node version
        uses: actions/setup-node@v6
        with:
          node-version: "26.4.0"
      - name: Install nodejs dependencies
        run: npm install
      - name: Build app
        run: npm run build
      - name: Save results build in artifact
        uses: actions/upload-artifact@v7
        id: upload-dist
        with:
          name: upload-dist
          path: |
            nginx.conf
            dist/
  release-app:
    name: "Release new app version"
    needs: build-app
    runs-on: ubuntu-latest
    steps:
      - name: Download files in artifact
        uses: actions/download-artifact@v8
        with:
          name: upload-dist
          path: files
      - name: Compress files dist from artifact
        run: zip -r .files/dist/99mart-${{ github.ref_name }}.zip ./*
      - name: Release to Github
        uses: softprops/action-gh-release@v3
        with:
          files: |
            99mart-${{ github.ref_name }}.zip