name: build-project
run-name: Running build-project
on:
  push:
  tags:
    - v1.*
jobs:
  Build-Project:
    runs-on:  ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      # - name: Setup node version
      #   uses: actions/setup-node@v6
      #   with:
      #     node-version: '26.4.0'
      # - name: Istalling dependencies
      #   run: npm install
      # - name: Build project
      #   run: npm run build
      - name: Build images
        run: docker build . -t ghcr.io/${{github.repository}}:latest
      - name: Login to docker
        run: echo -n ${{secrets.GITHUB_TOKEN}} | docker login ghcr.io --username ${{github.actor}} --password-stdin
      - name: push to ghcr.io
        run: docker push ghcr.io/${{github.repository}}:latest



